name: FaMTNarriAI CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install edge-tts pymupdf
          pip install fastapi httpx uvicorn python-multipart
          pip install deep-translator || true

      - name: Lint (warnings only)
        run: |
          pip install flake8 || true
          flake8 core/ api/ --max-line-length=120 --count --statistics || true
        continue-on-error: true

      - name: Run all tests
        run: pytest tests/ -v --tb=short

      - name: Coverage report
        run: pytest tests/ --cov=core --cov=api --cov-report=term-missing --cov-report=xml
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
