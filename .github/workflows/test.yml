# ═══════════════════════════════════════════════════════════════
# .github/workflows/test.yml  — NarraAI CI Pipeline
#
# WHAT THIS DOES:
#   Every time you push code to GitHub, this runs automatically:
#   1. Spins up a clean Linux machine (free, provided by GitHub)
#   2. Installs Python + dependencies
#   3. Runs all tests
#   4. Shows green ✓ or red ✗ on your commit
#
# This is called CI — Continuous Integration.
# Standard practice at every professional software company.
#
# HOW TO SEE RESULTS:
#   GitHub repo → Actions tab → click any run
# ═══════════════════════════════════════════════════════════════

name: FaMTNarriAI CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install edge-tts pymupdf
          # deep-translator optional — install for full test coverage
          pip install deep-translator || true

      - name: Lint with flake8 (warnings only, won't fail build)
        run: |
          pip install flake8 || true
          flake8 core/ --max-line-length=120 --count --statistics || true
        continue-on-error: true

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=core --cov-report=term-missing --cov-report=xml
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
