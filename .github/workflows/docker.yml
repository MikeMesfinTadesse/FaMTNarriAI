# ═══════════════════════════════════════════════════════════════
# .github/workflows/docker.yml — Build and push Docker image
#
# WHAT THIS DOES:
#   When you push to main, this automatically:
#   1. Builds your Docker container
#   2. Pushes it to Docker Hub (free public registry)
#
# WHY:
#   Anyone in the world can then run your app with one command:
#   docker run yourusername/famtnarriai --cli --input book.pdf
#
# SETUP (one time):
#   1. Create a free account at hub.docker.com
#   2. In your GitHub repo → Settings → Secrets → Actions
#   3. Add:  DOCKER_USERNAME = your DockerHub username
#            DOCKER_PASSWORD = your DockerHub password or token
# ═══════════════════════════════════════════════════════════════

name: Build & Push Docker Image

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]          # also trigger on version tags like v1.2.0

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/famtnarriai
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
